name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: build and archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE="stage"
          OUT="dist"
          mkdir -p "${STAGE}" "${OUT}"

          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          bin="workhorse-agent${ext}"

          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${STAGE}/${bin}" \
            ./cmd/workhorse-agent

          base="workhorse-agent_${VERSION}_${GOOS}_${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            (cd "${STAGE}" && zip -q "../${OUT}/${base}.zip" "${bin}")
          else
            tar -C "${STAGE}" -czf "${OUT}/${base}.tar.gz" "${bin}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: workhorse-agent_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: compute checksums
        run: |
          set -euo pipefail
          cd dist
          # Deterministic ordering so the file diffs cleanly across runs.
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -printf '%f\n' | sort | xargs -r sha256sum > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          body: "Generated by release workflow."
          fail_on_unmatched_files: true
