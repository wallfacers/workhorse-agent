<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>workhorse-agent</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; }
  body { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr; height: 100vh; background: #f5f5f5; color: #222; }
  @media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #ddd; } .panel { background: #232323 !important; border-color: #333 !important; } input, select, textarea, button { background: #2a2a2a; color: #ddd; border-color: #444 !important; } .session.active { background: #2d3748 !important; } .bubble.assistant { background: #1f2937 !important; } .bubble.user { background: #1e3a8a !important; } .chip { background: #374151 !important; color: #ddd !important; } }
  header { grid-column: 1 / 3; padding: 8px 16px; background: #2d3748; color: #fff; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .meta { font-size: 12px; opacity: 0.8; }
  aside { grid-row: 2; padding: 12px; overflow-y: auto; border-right: 1px solid #ddd; background: #fff; }
  aside h2 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; color: #666; }
  .panel { background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .panel label { display: block; margin: 6px 0 2px; font-size: 12px; color: #555; }
  .panel input, .panel select { width: 100%; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .panel button, main button, .modal button { padding: 6px 12px; border: 1px solid #2d3748; background: #2d3748; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .panel button:hover, main button:hover { background: #1a202c; }
  .panel .row { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .session { padding: 6px 8px; border-radius: 4px; cursor: pointer; margin-bottom: 4px; font-size: 12px; border: 1px solid transparent; }
  .session:hover { background: #f0f0f0; }
  .session.active { background: #e2e8f0; border-color: #2d3748; }
  .session .id { font-family: ui-monospace, monospace; font-weight: 600; }
  .session .status { display: inline-block; padding: 1px 6px; border-radius: 8px; background: #cbd5e0; color: #2d3748; font-size: 10px; margin-left: 4px; }
  main { grid-row: 2; display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
  .toolbar { padding: 8px 12px; border-bottom: 1px solid #ddd; background: #fff; display: flex; gap: 8px; align-items: center; }
  .toolbar .last-id { margin-left: auto; font-family: ui-monospace, monospace; font-size: 11px; color: #666; }
  .toolbar button.secondary { background: #fff; color: #2d3748; }
  .toolbar button.danger { background: #c53030; border-color: #c53030; }
  #log { overflow-y: auto; padding: 12px; }
  .bubble { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 80%; white-space: pre-wrap; word-wrap: break-word; }
  .bubble.user { background: #bee3f8; color: #1a365d; margin-left: auto; }
  .bubble.assistant { background: #fff; border: 1px solid #e5e5e5; }
  .bubble.sys { background: transparent; color: #888; font-size: 12px; font-style: italic; max-width: 100%; padding: 4px 0; }
  .chip { display: inline-block; background: #edf2f7; color: #2d3748; padding: 2px 8px; border-radius: 12px; margin: 2px 4px 2px 0; font-size: 12px; font-family: ui-monospace, monospace; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
  .chip.tool { border-left: 3px solid #4299e1; padding-left: 6px; }
  .chip.tool.done { border-left-color: #48bb78; }
  .chip.tool.error { border-left-color: #c53030; }
  .indented { margin-left: 24px; border-left: 2px solid #cbd5e0; padding-left: 8px; }
  .composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #ddd; background: #fff; }
  .composer textarea { flex: 1; height: 60px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 13px; resize: vertical; }
  .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 10; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; padding: 20px; border-radius: 8px; max-width: 480px; width: 90%; }
  .modal h3 { margin-top: 0; }
  .modal pre { background: #f5f5f5; padding: 8px; border-radius: 4px; font-size: 12px; max-height: 200px; overflow: auto; }
  .modal .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .modal .actions button { flex: 1 1 auto; min-width: 100px; }
  .modal button.deny { background: #c53030; border-color: #c53030; }
</style>
</head>
<body>
  <header>
    <h1>workhorse-agent</h1>
    <div class="meta">reference UI</div>
  </header>
  <aside>
    <div class="panel">
      <h2 style="margin-top:0;font-size:12px;text-transform:uppercase;color:#666;">New session</h2>
      <label>workdir</label>
      <input id="f-workdir" value="/tmp">
      <label>provider</label>
      <select id="f-provider"><option>anthropic</option><option>openai</option></select>
      <label>model</label>
      <input id="f-model" value="claude-sonnet-4-6">
      <div class="row">
        <label style="margin:0;flex:1;"><input type="checkbox" id="f-ephemeral" checked> ephemeral</label>
        <button id="btn-create">Create</button>
      </div>
    </div>
    <div class="panel">
      <div class="row" style="margin-top:0;justify-content:space-between;">
        <h2 style="margin:0;">Sessions</h2>
        <button id="btn-refresh" class="secondary" style="background:#fff;color:#2d3748;border-color:#ccc;padding:2px 8px;font-size:11px;">Refresh</button>
      </div>
      <div id="session-list"></div>
    </div>
  </aside>
  <main>
    <div class="toolbar">
      <span id="active-info">No session selected</span>
      <button id="btn-cancel" class="secondary" disabled>Cancel</button>
      <button id="btn-delete" class="danger" disabled>Delete</button>
      <span class="last-id">last_event_id: <span id="last-id">-</span></span>
    </div>
    <div id="log"></div>
    <div class="composer">
      <textarea id="msg" placeholder="Type a user message..." disabled></textarea>
      <button id="btn-send" disabled>Send</button>
    </div>
  </main>
  <div class="modal-bg" id="perm-modal">
    <div class="modal">
      <h3>Permission request</h3>
      <p id="perm-summary"></p>
      <pre id="perm-detail"></pre>
      <div class="actions">
        <button data-decision="allow_once">Allow once</button>
        <button data-decision="allow_session">Allow session</button>
        <button data-decision="allow_permanent">Allow permanent</button>
        <button data-decision="deny" class="deny">Deny</button>
        <button data-decision="deny_permanent" class="deny">Deny permanent</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
